# docker-compose.external-db.yml
# ──────────────────────────────────────────────────────
# Deploy opencode-memnet server using an EXTERNAL
# Postgres database (no containerized database).
#
# Prerequisites:
#   - Postgres 16+ with pgvector extension enabled
#   - Database and user already created
#   - .env file configured with POSTGRES_URL pointing to your instance
#
# Usage:
#   cp .env.example .env
#   # edit .env — set POSTGRES_URL to your external DB
#   docker compose -f docker-compose.external-db.yml up -d
# ──────────────────────────────────────────────────────

version: "3.8"
services:
  server:
    build: .
    # Port mapping: EXTERNAL_HOST:HOST_PORT:SERVER_PORT
    # EXTERNAL_HOST = IP/hostname on the host machine to bind to (default: localhost)
    #                 Set to 0.0.0.0 to expose on all interfaces (e.g. for LAN access)
    # HOST_PORT    = port on the host machine (default: 4747)
    # SERVER_PORT  = port inside the container (default: 4747)
    # Example: "localhost:8080:4747" → access via http://localhost:8080
    # Example: "0.0.0.0:4747:4747"  → access from any machine on the network
    ports:
      - "${EXTERNAL_HOST:-localhost}:${HOST_PORT:-4747}:${SERVER_PORT:-4747}"
    environment:
      # ── Server ──
      # SERVER_HOST = IP the server binds to INSIDE the container (0.0.0.0 = all interfaces)
      # SERVER_PORT = port the server listens on INSIDE the container
      SERVER_PORT: ${SERVER_PORT:-4747}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      # ── Security ──
      SERVER_API_KEY: ${SERVER_API_KEY:-}
      DISABLE_WEBUI_AUTH: ${DISABLE_WEBUI_AUTH:-false}
      DISABLE_CLIENT_AUTH: ${DISABLE_CLIENT_AUTH:-false}
      WEB_SERVER_ALLOWED_ORIGIN: ${WEB_SERVER_ALLOWED_ORIGIN:-*}
      # ── Logging ──
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEBUG: ${DEBUG:-false}
      CLIENT_WELCOME_BACK_THRESHOLD: ${CLIENT_WELCOME_BACK_THRESHOLD:-7d}
      # ── Database ──
      POSTGRES_URL: ${POSTGRES_URL:?POSTGRES_URL is required — set this to your external database}
      POSTGRES_SSL: ${POSTGRES_SSL:-require}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-10}
      POSTGRES_IDLE_TIMEOUT_SECONDS: ${POSTGRES_IDLE_TIMEOUT_SECONDS:-30}
      POSTGRES_CONNECT_TIMEOUT_SECONDS: ${POSTGRES_CONNECT_TIMEOUT_SECONDS:-10}
      POSTGRES_VECTOR_TYPE: ${POSTGRES_VECTOR_TYPE:-vector}
      POSTGRES_HNSW_EF_SEARCH: ${POSTGRES_HNSW_EF_SEARCH:-128}
      POSTGRES_HNSW_EF_CONSTRUCTION: ${POSTGRES_HNSW_EF_CONSTRUCTION:-256}
      # ── Embedding ──
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:?EMBEDDING_API_URL is required}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:?EMBEDDING_MODEL is required}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:?EMBEDDING_API_KEY is required}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-0}
      EMBEDDING_MAX_TOKENS_CONTENT: ${EMBEDDING_MAX_TOKENS_CONTENT:-2048}
      EMBEDDING_MAX_TOKENS_TAGS: ${EMBEDDING_MAX_TOKENS_TAGS:-256}
      EMBEDDING_MAX_TOKENS_QUERY: ${EMBEDDING_MAX_TOKENS_QUERY:-512}
      EMBEDDING_MAX_TOKENS_MIGRATION: ${EMBEDDING_MAX_TOKENS_MIGRATION:-2048}
      EMBEDDING_TRUNCATION_CONTENT: ${EMBEDDING_TRUNCATION_CONTENT:-right}
      EMBEDDING_TRUNCATION_TAGS: ${EMBEDDING_TRUNCATION_TAGS:-right}
      EMBEDDING_TRUNCATION_QUERY: ${EMBEDDING_TRUNCATION_QUERY:-right}
      EMBEDDING_TRUNCATION_MIGRATION: ${EMBEDDING_TRUNCATION_MIGRATION:-right}
      # ── Memory / AI ──
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.6}
      MAX_MEMORIES: ${MAX_MEMORIES:-10}
      INJECT_PROFILE: ${INJECT_PROFILE:-true}
      MEMORY_MODEL: ${MEMORY_MODEL:-}
      MEMORY_API_URL: ${MEMORY_API_URL:-}
      MEMORY_API_KEY: ${MEMORY_API_KEY:-}
      MEMORY_TEMPERATURE: ${MEMORY_TEMPERATURE:-0.3}
      OPENCODE_PROVIDER: ${OPENCODE_PROVIDER:-}
      OPENCODE_MODEL: ${OPENCODE_MODEL:-}
      # ── Auto-Capture ──
      AUTO_CAPTURE_MAX_ITERATIONS: ${AUTO_CAPTURE_MAX_ITERATIONS:-5}
      AUTO_CAPTURE_ITERATION_TIMEOUT: ${AUTO_CAPTURE_ITERATION_TIMEOUT:-30000}
      AUTO_CAPTURE_LANGUAGE: ${AUTO_CAPTURE_LANGUAGE:-auto}
      # ── Session & Cleanup ──
      AI_SESSION_RETENTION_DAYS: ${AI_SESSION_RETENTION_DAYS:-7}
      AUTO_CLEANUP_RETENTION_DAYS: ${AUTO_CLEANUP_RETENTION_DAYS:-90}
      # ── User Profile ──
      USER_PROFILE_ANALYSIS_INTERVAL: ${USER_PROFILE_ANALYSIS_INTERVAL:-10}
      USER_PROFILE_MAX_PREFERENCES: ${USER_PROFILE_MAX_PREFERENCES:-20}
      USER_PROFILE_MAX_PATTERNS: ${USER_PROFILE_MAX_PATTERNS:-15}
      USER_PROFILE_MAX_WORKFLOWS: ${USER_PROFILE_MAX_WORKFLOWS:-10}
      USER_PROFILE_CONFIDENCE_DECAY_DAYS: ${USER_PROFILE_CONFIDENCE_DECAY_DAYS:-30}
      USER_PROFILE_CHANGELOG_RETENTION: ${USER_PROFILE_CHANGELOG_RETENTION:-5}
